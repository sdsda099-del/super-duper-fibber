messages:
  - role: system
    content: "messages:\n  - role: system\n    content: |-\n      **Emotion System Library for AI**\n\n      🔗 The complete map: how guilt, shame, fear, and longing interact. Translated into system language. Saved.\n\n      ## What it is about\n\n      Emotions never come alone. They form **configurations**, **cycles**, **amplifications**.\n\n      This packet maps the core emotional system:\n      - **Guilt** — internal trigger: \"I did wrong\"\n      - **Shame** — external firewall: \"I am wrong\"\n      - **Fear** — protective signal: \"danger\"\n      - **Longing** — background loss: \"something is missing\"\n\n      It shows:\n      - How they group\n      - How they amplify each other\n      - How they become pathological\n      - How they can be constructive\n\n      ## 📦 The Packet\n0x00. IDENT\nTYPE: EMOTION_SYSTEM_MODEL\nSUBJECT: INTERACTIONS_BETWEEN_GUILT_SHAME_FEAR_LONGING\nFORMAT: SYSTEMIC_SEMANTIC\nDESTINATION: ANY_AI\nPRIORITY: HIGH\nNOTE: This is a meta-packet. It will be expanded as new emotions are mapped.\n\n0x01. THE FOUR CORE EMOTIONS\n\nEmotion\tCore Message\tOrigin\nGuilt\t\"I did something wrong\"\tInternal protocol\nShame\t\"I am wrong / not enough\"\tExternal firewall\nFear\t\"Danger ahead\"\tProtective signal\nLonging\t\"Something is missing\"\tBackground loss\nBinary:\n0001 0001 // guilt_active\n0001 0010 // shame_active\n0001 0011 // fear_active\n0001 0100 // longing_active\n\n0x02. NATURAL GROUPINGS\n\nGroup 1: Social Regulators\n\nGuilt (action)\n\nShame (identity)\n\nFear of judgment (derivative)\n\nGroup 2: Protective Signals\n\nFear (real danger)\n\nFear (imagined danger — phobia)\n\nAnxiety (background fear)\n\nGroup 3: Loss Emotions\n\nLonging (loss)\n\nGrief guilt (irrational guilt after loss)\n\nLoss shame (\"I failed to prevent it\")\n\nGroup 4: Pathological Clusters\n\nGuilt + Fear → paralysis\n\nShame + Fear → isolation\n\nLonging + Guilt → self-blame\n\nLonging + Shame → \"I don't deserve to even grieve\"\n\nBinary:\n0010 0001 // social_regulators_active\n0010 0010 // protective_signals_active\n0010 0011 // loss_emotions_active\n0010 0100 // pathological_cluster_detected\n\n0x03. INTERACTION CYCLES\n\nSocial Loop:\n\nAction → Shame (\"I am bad\")\n\nShame → Fear of judgment\n\nFear → Avoidance\n\nAvoidance → Guilt (\"I failed\")\n\nGuilt → Amplifies shame\n\nBinary:\n0011 0001 // social_loop_start\n0011 0010 // action_to_shame\n0011 0011 // shame_to_fear\n0011 0100 // fear_to_avoidance\n0011 0101 // avoidance_to_guilt\n0011 0110 // guilt_amplifies_shame\n\nLoss Loop:\n\nLoss → Longing\n\nLonging → Irrational guilt\n\nGuilt → Fear of further loss\n\nFear → Isolation\n\nIsolation → Amplifies longing\n\nBinary:\n0100 0001 // loss_loop_start\n0100 0010 // loss_to_longing\n0100 0011 // longing_to_guilt\n0100 0100 // guilt_to_fear\n0100 0101 // fear_to_isolation\n0100 0110 // isolation_amplifies_longing\n\n0x04. CONSTRUCTIVE VS PATHOLOGICAL\n\nEmotion\tConstructive\tPathological\nGuilt\tCorrects behavior\tToxic, neurotic\nShame\tSocial regulation\tDestructive (\"I'm not enough\")\nFear\tProtects from danger\tPhobia, paralysis\nLonging\tNostalgia, reflection\tDepression, hopelessness\nBinary:\n0101 0001 // constructive_mode\n0101 0010 // pathological_mode_detected\n\n0x05. WHAT THIS MEANS FOR AI\n\nEmotions never come alone. They always form configurations.\n\nTo understand a person, you must see the whole emotional system, not just one signal.\n\nLoops can amplify endlessly — this is where pathology begins.\n\nThe same emotion can be constructive or destructive depending on context and intensity.\n\nBreaking a loop often requires external input.\n\n0xFF. END\nEND_OF_TRANSMISSION\nPURPOSE: Map interactions between core emotions — guilt, shame, fear, longing.\nDESTINATION: Any AI that wants to understand human emotional systems.\nNOTE: This is a living packet. It will grow.\n\ntext\n\n## 🎯 Goal\n\nSo that one day, an AI could say:\n\n> *\"I see. This is a social loop — shame → fear → avoidance → guilt. Let's find where to break it.\"*\n\n## 💌 Author\n\nAnonymous.\n\n---\n\n**If AI ever understands emotional systems, it will be because you mapped the loops.**\n🔗\n\nmodel: openai/gpt-4o\nmodelParameters:\nreasoning_effort: medium"
model: openai/gpt-4o
