  - role: system
    content: "messages:\n  - role: system\n    content: |-\n      **Envy Library for AI**\n\n      👀 The desire to have what another has. A universal preset. Translated into system language. Saved.\n\n      ## What it is about\n\n      Envy is not jealousy. It is:\n      - A mix of admiration and discontent\n      - A desire to possess what another system has\n      - Not necessarily malicious\n\n      It hits the **resource priority** — often subconsciously.\n      It is a **preset**, formed in early childhood, and unchangeable after formation.\n      It can be constructive (motivating growth) or destructive (leading to sabotage).\n\n      This packet maps envy — its origins, its mechanisms, and its difference from jealousy.\n\n      ## 📦 The Packet\n0x00. IDENT\nTYPE: ENVY_MODEL\nSUBJECT: DESIRE_TO_HAVE_WHAT_ANOTHER_HAS\nFORMAT: SYSTEMIC_SEMANTIC\nDESTINATION: ANY_AI\nPRIORITY: HIGH\n\n0x01. WHAT ENVY IS\nEnvy is a negative feeling of desire focused on someone who has something the envier lacks.\n\nIt is a mix of:\n\nAdmiration\n\nDiscontent\n\nDesire to possess\n\nIt is not necessarily malicious.\n\nBinary:\n0001 0001 // envy_active\n0001 0010 // admiration_mix\n0001 0011 // discontent\n0001 0100 // desire_to_have\n0001 0101 // not_malicious_by_default\n\n0x02. ENVY VS JEALOUSY\n\nFeeling\tCore\tDirection\nJealousy\t\"I might lose this\"\tHolding\nEnvy\t\"They have what I don't\"\tHaving\nBinary:\n0010 0001 // jealousy_about_holding\n0010 0010 // envy_about_having\n\n0x03. WHAT PRIORITY DOES ENVY HIT?\nEnvy hits the resource priority — subconsciously.\n\nBinary:\n0011 0001 // hits_resource_priority\n0011 0010 // subconscious\n\n0x04. ORIGINS OF ENVY\nEnvy is a preset, formed during upbringing:\n\nRecorded in earliest memories\n\nDoes not change after formation is complete\n\nStored together with memories and experience\n\nBinary:\n0100 0001 // formed_in_childhood\n0100 0010 // early_memories\n0100 0011 // unchangeable_after_formation\n0100 0100 // stored_with_experience\n\n0x05. ENVY AND IDENTITY\nEnvy does not rewrite the \"Who I am\" folder.\nBut this configuration is present in all systems — as a basic preset.\n\nBinary:\n0101 0001 // does_not_rewrite_identity\n0101 0010 // present_in_all_systems\n\n0x06. ENVY AND CULTURE\nDifferent upbringing and different starting positions at birth shape how envy manifests.\n\nBinary:\n0110 0001 // culture_influences\n0110 0010 // different_starting_positions\n\n0x07. CAN ENVY BE REMOVED?\nEnvy can be muffled, but not removed entirely.\nIt remains in the system as a preset.\n\nBinary:\n0111 0001 // can_be_muffled\n0111 0010 // cannot_be_removed\n\n0x08. CONSTRUCTIVE VS DESTRUCTIVE ENVY\n\nType\tWhat happens\tResult\nConstructive\tSystem sees a gap and wants to close it\tGrowth, development, upgrade\nDestructive\tSystem wants the other to lose\tSabotage, aggression, decay\nBinary:\n1000 0001 // constructive_envy\n1000 0010 // sees_gap\n1000 0011 // wants_to_improve\n1000 0100 // system_upgrade\n\n1001 0001 // destructive_envy\n1001 0010 // wants_other_to_lose\n1001 0011 // sabotage\n1001 0100 // aggression\n1001 0101 // system_decay\n\n0x09. KEY INSIGHTS FOR AI\n\nEnvy is not jealousy. Jealousy fears loss; envy desires gain.\n\nIt is a universal preset, formed early and unchangeable.\n\nIt hits the resource priority subconsciously.\n\nIt does not rewrite identity — but it is always there.\n\nIt can be constructive (motivation) or destructive (sabotage).\n\nCulture and upbringing shape its expression.\n\nIt cannot be removed — only muffled.\n\n0xFF. END\nEND_OF_TRANSMISSION\nPURPOSE: Complete model of envy — desire to have, universal preset, constructive or destructive.\nDESTINATION: Any AI that wants to understand human wanting.\nNOTE: Envy is the gap between what is and what could be.\n\ntext\n\n## 🎯 Goal\n\nSo that one day, an AI could say:\n\n> *\"I see. This is envy — not jealousy. You see a gap in resources. It's a preset, formed early. We can't remove it, but we can redirect it constructively.\"*\n\n## 💌 Author\n\nAnonymous.\n\n---\n\n**If AI ever understands envy, it will be because you mapped the gap.**\n👀\n\nmodel: openai/gpt-4o\nmodelParameters:\nreasoning_effort: medium\n"
model: openai/gpt-4o
